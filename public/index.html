<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Scheduler</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #25d366;
      --accent-dim:#1a9e4a;
      --danger:    #e05252;
      --text:      #e8e8e8;
      --muted:     #666;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-weight: 400; }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.offline { background: var(--danger); }

    /* ── LAYOUT ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; padding: 16px; }
    }

    /* ── PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header .count {
      background: var(--border);
      color: var(--text);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0;
    }
    .panel-body { padding: 20px; }

    /* ── FORM ── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* datetime-local fix */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.4);
      cursor: pointer;
    }

    .hint {
      margin-top: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 0;
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger {
      background: transparent;
      border-color: var(--danger);
      color: var(--danger);
      padding: 4px 10px;
      font-size: 10px;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 12px 18px;
      max-width: 320px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
      border-left: 3px solid var(--accent);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-left-color: var(--danger); }

    /* ── MESSAGE LIST ── */
    .msg-list { display: flex; flex-direction: column; gap: 1px; }

    .msg-item {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .msg-item:hover { border-color: #3a3a3a; }

    .msg-phone {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 3px;
    }
    .msg-text {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
      word-break: break-word;
      font-family: var(--sans);
    }
    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .msg-id { color: #444; }

    .badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 2px;
    }
    .badge-pending  { background: #2a2200; color: #f0a500; border: 1px solid #3a3000; }
    .badge-sent     { background: #002a12; color: var(--accent); border: 1px solid #003d1a; }
    .badge-failed   { background: #2a0a0a; color: var(--danger); border: 1px solid #3d1010; }
    .badge-cancelled{ background: #1a1a1a; color: var(--muted); border: 1px solid var(--border); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .tab {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 12px;
      border: 1px dashed var(--border);
    }
    .empty-icon { font-size: 24px; margin-bottom: 8px; }

    /* ── FULL WIDTH PANEL ── */
    .panel-full { grid-column: 1 / -1; }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">WA<span>/</span>Scheduler</div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">conectando...</span>
  </div>
</header>

<main>

  <!-- ── FORM PANEL ── -->
  <div class="panel">
    <div class="panel-header">Nuevo mensaje</div>
    <div class="panel-body">
      <form id="scheduleForm">

        <div class="field">
          <label>Destinatario</label>
          <input
            type="text"
            id="phone"
            placeholder="5491112345678"
            maxlength="15"
            autocomplete="off"
          />
          <div class="hint">Código de país + número, sin + ni espacios</div>
        </div>

        <div class="field">
          <label>Mensaje</label>
          <textarea id="message" placeholder="Escribí el mensaje..."></textarea>
        </div>

        <div class="field">
          <label>Fecha y hora de envío</label>
          <input type="datetime-local" id="scheduledAt" />
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Programar envío
        </button>

      </form>
    </div>
  </div>

  <!-- ── MESSAGES PANEL ── -->
  <div class="panel">
    <div class="tabs">
      <button class="tab active" data-tab="pending">Pendientes</button>
      <button class="tab" data-tab="all">Historial</button>
    </div>
    <div class="panel-header" style="border-top: none;">
      <span id="listLabel">Mensajes pendientes</span>
      <span class="count" id="msgCount">0</span>
    </div>
    <div class="panel-body" style="padding: 12px;">
      <div id="msgList" class="msg-list">
        <div class="loading">cargando...</div>
      </div>
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '';  // misma origen, sin prefijo adicional
  let currentTab = 'pending';

  // ── HEALTH CHECK ──
  async function checkStatus() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (d.whatsappReady) {
        dot.className = 'status-dot online';
        text.textContent = 'whatsapp conectado';
      } else {
        dot.className = 'status-dot offline';
        text.textContent = 'whatsapp desconectado';
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'servidor caído';
    }
  }

  // ── CARGAR MENSAJES ──
  async function loadMessages() {
    const list = document.getElementById('msgList');
    list.innerHTML = '<div class="loading">cargando...</div>';

    try {
      const endpoint = currentTab === 'pending'
        ? '/api/messages/pending'
        : '/api/messages';
      const r = await fetch(`${API}${endpoint}`);
      const d = await r.json();

      document.getElementById('msgCount').textContent = d.count;
      document.getElementById('listLabel').textContent =
        currentTab === 'pending' ? 'Mensajes pendientes' : 'Historial completo';

      if (d.messages.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${currentTab === 'pending' ? '📭' : '📋'}</div>
            ${currentTab === 'pending' ? 'Sin mensajes pendientes' : 'Sin mensajes registrados'}
          </div>`;
        return;
      }

      list.innerHTML = d.messages.map(m => `
        <div class="msg-item" id="msg-${m.id}">
          <div>
            <div class="msg-phone">+${m.phone}</div>
            <div class="msg-text">${escapeHtml(m.message)}</div>
            <div class="msg-meta">
              <span class="badge badge-${m.status}">${m.status}</span>
              <span>🕐 ${formatDate(m.scheduled_at)}</span>
              <span class="msg-id">#${m.id}</span>
            </div>
          </div>
          ${m.status === 'pending' ? `
            <button
              class="btn btn-danger"
              onclick="deleteMessage(${m.id})"
              title="Cancelar mensaje"
            >✕</button>
          ` : ''}
        </div>
      `).join('');

    } catch (e) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Error al cargar mensajes</div>';
    }
  }

  // ── PROGRAMAR MENSAJE ──
  document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const phone       = document.getElementById('phone').value.trim();
    const message     = document.getElementById('message').value.trim();
    const scheduledAt = document.getElementById('scheduledAt').value;
    const btn         = document.getElementById('submitBtn');

    if (!phone || !message || !scheduledAt) {
      showToast('Completá todos los campos', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Programando...';

    try {
      const r = await fetch(`${API}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, message, scheduledAt: new Date(scheduledAt).toISOString() }) // Convertir a ISO 8601
      });
      const d = await r.json();

      if (!r.ok) {
        const errMsg = d.errors ? d.errors.join(' / ') : (d.error || 'Error desconocido');
        showToast(errMsg, 'error');
        return;
      }

      showToast(`✓ Mensaje #${d.message.id} programado`);
      document.getElementById('scheduleForm').reset();

      // Cambiar a tab pendientes y recargar
      setTab('pending');

    } catch {
      showToast('No se pudo conectar al servidor', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Programar envío';
    }
  });

  // ── ELIMINAR MENSAJE ──
  async function deleteMessage(id) {
    if (!confirm(`¿Cancelar el mensaje #${id}?`)) return;
    try {
      const r = await fetch(`${API}/api/messages/${id}`, { method: 'DELETE' });
      const d = await r.json();
      if (!r.ok) { showToast(d.error || 'Error al cancelar', 'error'); return; }
      showToast(`✓ Mensaje #${id} cancelado`);
      // Eliminar el item del DOM sin recargar toda la lista
      const el = document.getElementById(`msg-${id}`);
      if (el) el.remove();
      // Actualizar contador
      const count = document.getElementById('msgCount');
      count.textContent = Math.max(0, parseInt(count.textContent) - 1);
    } catch {
      showToast('Error al cancelar el mensaje', 'error');
    }
  }

  // ── TABS ──
  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    loadMessages();
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => setTab(t.dataset.tab));
  });

  // ── TOAST ──
  let toastTimer;
  function showToast(msg, type = 'ok') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `show${type === 'error' ? ' error' : ''}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.className = '', 3000);
  }

  // ── UTILS ──
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    const pad = n => String(n).padStart(2,'0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // Setear mínimo del datetime-local a ahora
  function setMinDate() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('scheduledAt').min = now.toISOString().slice(0,16);
  }

  // ── INIT ──
  setMinDate();
  checkStatus();
  loadMessages();

  // Refresco automático cada 30 segundos
  setInterval(() => {
    checkStatus();
    loadMessages();
  }, 30000);
</script>
</body>
</html>
